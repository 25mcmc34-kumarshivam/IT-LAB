<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Registration | Shivam Pro Training</title>
    
    <style>
        /* CSS SECTION */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .form-box {
            background: white;
            width: 400px;
            padding: 30px;
            border-top: 10px solid #d90429; /* Boxing Red */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #222; }
        p.sub-text { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't increase width */
        }

      

        /* ERROR MESSAGES: DOM Manipulation targets */
        .error-text {
            color: #d90429;
            font-size: 12px;
            display: none; /* Hidden by default */
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d90429;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>BOXING REGISTRATION</h2>
    <p class="sub-text">National Gold Medalist Training<br>Location: Men's Hostel L, UoH</p>

    <form id="boxingForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter alphabets only">
            <div id="nameError" class="error-text">Names can only contain letters.</div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="email" placeholder="example@uohyd.ac.in">
            <div id="emailError" class="error-text">Enter a valid email address.</div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 8 chars + special">
            <div id="strength-meter"></div>
            <div id="passError" class="error-text">Needs 8+ chars (Upper, Lower, Number, Special).</div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob">
            <div id="dobError" class="error-text">You must be at least 18 years old.</div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="10 digits only">
            <div id="phoneError" class="error-text">Must be exactly 10 digits.</div>
        </div>

        <button type="submit">JOIN THE SQUAD</button>
    </form>
</div>

<script>
    /* JAVASCRIPT SECTION */

    // 1. Password Strength Logic using Math Object (Assignment Requirement)
    document.getElementById('password').addEventListener('input', function(e) {
        let val = e.target.value;
        let score = 0;
        
        // Check for different character types
        if (val.length >= 8) score += 25;
        if (/[A-Z]/.test(val)) score += 25;
        if (/[0-9]/.test(val)) score += 25;
        if (/[@$!%*#?&]/.test(val)) score += 25;

        // Use Math.min to ensure it doesn't exceed 100%
        let width = Math.min(score, 100);
        document.getElementById('strength-meter').style.width = width + "%";
        
        // Color change based on strength
        document.getElementById('strength-meter').style.background = width < 75 ? "red" : "green";
    });

    // 2. Form Submission & Validation (Assignment Requirement)
    document.getElementById('boxingForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Stop form from refreshing the page
        
        let isValid = true;

        // NAME VALIDATION: Alphabets only
        let name = document.getElementById('fullName').value;
        if (!/^[A-Za-z\s]+$/.test(name)) {
            showErr('nameError'); isValid = false;
        } else { hideErr('nameError'); }

        // EMAIL VALIDATION
        let email = document.getElementById('email').value;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showErr('emailError'); isValid = false;
        } else { hideErr('emailError'); }

        // PASSWORD VALIDATION (Complex requirements)
        let pass = document.getElementById('password').value;
        let passReg = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;
        if (!passReg.test(pass)) {
            showErr('passError'); isValid = false;
        } else { hideErr('passError'); }

        // DOB VALIDATION (18 Years Old Requirement)
        let dobInput = document.getElementById('dob').value;
        if (dobInput) {
            let birthDate = new Date(dobInput);
            let today = new Date();
            // Calculation: (Today - Birthday) converted from milliseconds to years
            let age = Math.floor((today - birthDate) / (31557600000)); 
            if (age < 18) {
                showErr('dobError'); isValid = false;
            } else { hideErr('dobError'); }
        } else { showErr('dobError'); isValid = false; }

        // PHONE VALIDATION: Exactly 10 digits
        let phone = document.getElementById('phone').value;
        if (!/^\d{10}$/.test(phone)) {
            showErr('phoneError'); isValid = false;
        } else { hideErr('phoneError'); }

        // FINAL SUBMISSION: Only if everything is valid
        if (isValid) {
            alert("Victory! " + name + ", you are registered for Boxing training at Hostel L!");
            this.reset(); // Clear form
            document.getElementById('strength-meter').style.width = "0%";
        }
    });

    // Helper Functions for DOM Manipulation (Assignment Requirement)
    function showErr(id) { document.getElementById(id).style.display = 'block'; }
    function hideErr(id) { document.getElementById(id).style.display = 'none'; }

</script>

</body>
</html>
